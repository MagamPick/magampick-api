name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build (compile + spotlessCheck + test + jacoco)
        run: ./gradlew build

      - name: Verify Docker image builds
        run: docker build -t magampick-api:ci .

      - name: Upload test report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Jacoco coverage (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: build/reports/jacoco/test/
          if-no-files-found: ignore
          retention-days: 14

  deploy-dev:
    name: Deploy to Dev
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: kasto6329
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: kasto6329/magampick-api:dev
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy compose and nginx files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,nginx/"
          target: "~/magampick-api/"

      - name: Write Firebase service account
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            mkdir -p ~/magampick-api
            cat > ~/magampick-api/firebase-service-account.json << 'FBEOF'
            ${{ secrets.DEV_FIREBASE_SERVICE_ACCOUNT }}
            FBEOF

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            cd ~/magampick-api
            cat > .env << 'ENVEOF'
            SPRING_PROFILES_ACTIVE=dev
            APP_IMAGE=kasto6329/magampick-api:dev
            DOMAIN=api.dev.magampick.com
            POSTGRES_IMAGE=kasto6329/magampick-postgres:16
            POSTGRES_DB=magampick
            POSTGRES_USER=magampick
            POSTGRES_PASSWORD=${{ secrets.DEV_POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.DEV_JWT_SECRET }}
            KAKAO_CLIENT_ID=${{ secrets.DEV_KAKAO_CLIENT_ID }}
            KAKAO_CLIENT_SECRET=${{ secrets.DEV_KAKAO_CLIENT_SECRET }}
            SOLAPI_API_KEY=${{ secrets.DEV_SOLAPI_API_KEY }}
            SOLAPI_API_SECRET=${{ secrets.DEV_SOLAPI_API_SECRET }}
            SOLAPI_SENDER_NUMBER=${{ secrets.DEV_SOLAPI_SENDER_NUMBER }}
            NTS_BUSINESS_API_KEY=${{ secrets.DEV_NTS_BUSINESS_API_KEY }}
            ADMIN_USERNAME=${{ secrets.DEV_ADMIN_USERNAME }}
            ADMIN_PASSWORD=${{ secrets.DEV_ADMIN_PASSWORD }}
            TOSS_SECRET_KEY=${{ secrets.DEV_TOSS_SECRET_KEY }}
            FCM_MOCK_ENABLED=false
            ENVEOF
            echo "FCM_CREDENTIALS=$(base64 -w 0 ~/magampick-api/firebase-service-account.json)" >> .env
            docker login -u kasto6329 -p '${{ secrets.DOCKERHUB_TOKEN }}'
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
