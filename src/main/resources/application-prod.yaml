app:
  sms:
    mock-enabled: true  # 실발송 전환 시 SMS_MOCK_ENABLED=false 환경변수 설정

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate

cors:
  allowed-origins:
    - https://magampick.com
    - https://admin.magampick.com

auth:
  refresh-cookie:
    secure: true

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

magampick:
  storage:
    oci:
      bucket: magampick-prod-uploads
