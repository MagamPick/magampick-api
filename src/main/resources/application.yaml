spring:
  application:
    name: magampick-api
  profiles:
    active: local
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd'T'HH:mm:ssXXX
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-minutes: ${JWT_ACCESS_TTL_MINUTES:30}
  refresh-token-validity-days: ${JWT_REFRESH_TTL_DAYS:30}

auth:
  refresh-cookie:
    name: refresh_token
    path: /api/v1/auth
    same-site: Lax
    secure: ${REFRESH_COOKIE_SECURE:false}

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me

solapi:
  api-key: ${SOLAPI_API_KEY:}
  api-secret: ${SOLAPI_API_SECRET:}
  sender-number: ${SOLAPI_SENDER_NUMBER:}
  api-url: ${SOLAPI_API_URL:https://api.solapi.com}

# SMS mock 모드. true: 실발송 없이 로그, 000000 코드로 본인인증 우회 가능. false: SOLAPI 실발송.
# 로컬·테스트는 application-local/test.yaml 에서 true 로 덮어씀. 환경변수 SMS_MOCK_ENABLED 로 override 가능.
app:
  sms:
    mock-enabled: ${SMS_MOCK_ENABLED:false}

# 국세청 사업자등록 검증 (공공데이터포털). service-key 는 환경변수(미설정 시 호출 거부 → VERIFICATION_FAILED). test 프로파일은 Mock 사용.
# verification-mode: status(기본, 상태조회 번호만 — 출시 전 데모 단계) | validate(진위확인 번호+대표자명+개업일자 3요소). validate 전환 시 NTS_VERIFICATION_MODE=validate
nts:
  service-key: ${NTS_BUSINESS_API_KEY:}
  verification-mode: ${NTS_VERIFICATION_MODE:status}
  validate-url: https://api.odcloud.kr/api/nts-businessman/v1/validate
  status-url: https://api.odcloud.kr/api/nts-businessman/v1/status

admin:
  seed:
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
    name: ${ADMIN_NAME:관리자}

magampick:
  storage:
    local:
      root-path: ${STORAGE_LOCAL_ROOT_PATH:${user.home}/.magampick/uploads}
    oci:
      namespace: ${OCI_NAMESPACE:axuqml8mwqye}
      region: ${OCI_REGION:ap-chuncheon-1}
      # local·dev 공유 버킷. prod 는 application-prod.yaml 에서 override
      bucket: ${OCI_BUCKET:magampick-dev-uploads}
      # 아래 둘은 local 프로파일의 API Key 인증에만 사용 (dev/prod 는 Instance Principal)
      config-path: ${OCI_CONFIG_PATH:${user.home}/.oci/config}
      config-profile: ${OCI_CONFIG_PROFILE:APIKEY}
