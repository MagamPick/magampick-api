spring:
  application:
    name: magampick-api
  profiles:
    active: local
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd'T'HH:mm:ssXXX
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-minutes: ${JWT_ACCESS_TTL_MINUTES:30}
  refresh-token-validity-days: ${JWT_REFRESH_TTL_DAYS:30}

auth:
  refresh-cookie:
    name: refresh_token
    path: /api/v1/auth
    same-site: Lax
    secure: ${REFRESH_COOKIE_SECURE:false}

magampick:
  storage:
    local:
      root-path: ${STORAGE_LOCAL_ROOT_PATH:${user.home}/.magampick/uploads}
