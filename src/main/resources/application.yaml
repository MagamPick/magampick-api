spring:
  application:
    name: magampick-api
  profiles:
    active: local
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd'T'HH:mm:ssXXX
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
