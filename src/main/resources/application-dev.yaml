app:
  sms:
    mock-enabled: true  # 실발송 전환 시 SMS_MOCK_ENABLED=false 환경변수 설정

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate

cors:
  allowed-origins:
    - https://dev.magampick.com
    - https://api.dev.magampick.com
    - http://localhost:5173

auth:
  refresh-cookie:
    secure: true
