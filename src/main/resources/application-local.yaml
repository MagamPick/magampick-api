app:
  sms:
    mock-enabled: true  # 로컬에서 실발송 테스트 원하면 SMS_MOCK_ENABLED=false 환경변수 설정

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/magampick
    username: magampick
    password: magampick
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:local-only-development-secret-key-not-for-production-use}

cors:
  allowed-origins:
    - "*"
    - "http://localhost:5173"
