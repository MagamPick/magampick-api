spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/magampick
    username: magampick
    password: magampick
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET:local-only-development-secret-key-not-for-production-use}

cors:
  allowed-origins:
    - "*"
    - "http://localhost:5173"
